services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
      DB_PROVIDER: mongo
      DATABASE_PATH: /app/data/startup-validation.db
      MONGO_URI: mongodb://mongo:27017/validation_engine
      CORS_ORIGIN: http://localhost:8080
      FRONTEND_URL: http://localhost:8080
      BACKEND_PUBLIC_URL: http://localhost:4000
      TRUST_PROXY: 0
    ports:
      - "4000:4000"
    volumes:
      - backend_data:/app/data
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  backend_data:
  mongo_data:
